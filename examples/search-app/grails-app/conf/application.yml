info:
  app:
    name: '@info.app.name@'
    version: '@info.app.version@'
    grailsVersion: '@info.app.grailsVersion@'
grails:
  codegen:
    defaultPackage: grails.plugins.elasticsearch
  profile: web
  assets:
    storagePath: ''
  mime:
    disable:
      accept:
        header:
          userAgents:
          - Gecko
          - WebKit
          - Presto
          - Trident
    types:
      all: '*/*'
      atom: application/atom+xml
      css: text/css
      csv: text/csv
      form: application/x-www-form-urlencoded
      html:
      - text/html
      - application/xhtml+xml
      js: text/javascript
      json:
      - application/json
      - text/json
      multipartForm: multipart/form-data
      pdf: application/pdf
      rss: application/rss+xml
      text: text/plain
      hal:
      - application/hal+json
      - application/hal+xml
      xml:
      - text/xml
      - application/xml
dataSource:
  driverClassName: org.h2.Driver
  username: sa
  password: ''
  pooled: true
  jmxExport: true
environments:
  development:
    dataSource:
      dbCreate: create-drop
      url: jdbc:h2:mem:devDb;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE
    elasticSearch:
      client:
        mode: local
        hosts:
          - {host: localhost, port: 9200}
        transport.sniff: true
      bulkIndexOnStartup: true
      datastoreImpl: hibernateDatastore
  test:
    elasticSearch:
      client:
        mode: local
        hosts:
          - {host: localhost, port: 9200}
        transport.sniff: false
        username:
        password:
      datastoreImpl: hibernateDatastore
      index:
        store.type: simplefs
        settings:
          analysis:
            filter:
              replace_synonyms:
                type: synonym
                synonyms: ['abc => xyz']
            analyzer:
              test_analyzer:
                tokenizer: standard
                filter: ['lowercase']
              repl_analyzer:
                tokenizer: standard
                filter: ['lowercase', 'replace_synonyms']
    dataSource:
      dbCreate: update
      url: jdbc:h2:mem:testDb;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE
  production:
    dataSource:
      dbCreate: none
      url: jdbc:h2:./prodDb;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE
hibernate:
  cache:
    queries: false
    use_second_level_cache: false
    use_query_cache: false
