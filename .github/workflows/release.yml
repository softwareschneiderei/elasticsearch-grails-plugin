name: "Release"
on:
  release:
    types: [ published ]
permissions: { }
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GRAILS_PUBLISH_RELEASE: 'true'
  JAVA_DISTRIBUTION: 'liberica'
  REPO_NAME: ${{ github.event.repository.name }}
  TAG: ${{ github.event.release.tag_name }}
  VERSION: 'will be computed in each job'
concurrency:
  group: release-pipeline
  cancel-in-progress: false
jobs:
  publish:
    name: "Stage Jar Files"
    permissions:
      packages: read
      contents: write
      issues: write
    runs-on: ubuntu-24.04
    steps:
      - name: "📝 Establish release version"
        run: echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - name: "Output Agent IP"
        run: curl -s https://api.ipify.org

      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ env.TAG }}

      - name: "Export .sdkmanrc properties"
        uses: apache/grails-github-actions/export-gradle-properties@asf
        with:
          file: ".sdkmanrc"
          prefix: "SDKMANRC_"

      - name: "Determine Java Version"
        run: echo "SDKMANRC_java=${{ env.SDKMANRC_java }}" | sed 's/-.*//' >> $GITHUB_ENV

      - name: "☕️ Setup JDK"
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.SDKMANRC_java }}

      - name: "🐘 Setup Gradle"
        uses: gradle/actions/setup-gradle@v4

      - name: "⚙️ Run pre-release"
        uses: apache/grails-github-actions/pre-release@asf
        env:
          RELEASE_VERSION: ${{ env.VERSION }}

      - name: "🔐 Generate key file for artifact signing"
        env:
          SECRING_FILE: ${{ secrets.SECRING_FILE }}
        run: echo "$SECRING_FILE" | base64 -d > ${{ github.workspace }}/secring.gpg

      - name: "📤 Publish to Maven Central"
        env:
          NEXUS_PUBLISH_USERNAME: ${{ secrets.NEXUS_PUBLISH_USERNAME }}
          NEXUS_PUBLISH_PASSWORD: ${{ secrets.NEXUS_PUBLISH_PASSWORD }}
          NEXUS_PUBLISH_URL: 'https://ossrh-staging-api.central.sonatype.com/service/local/'
          NEXUS_PUBLISH_DESCRIPTION: '${{ env.REPO_NAME }}:${{ env.VERSION }}'
          SIGNING_KEYID: ${{ secrets.SIGNING_KEYID }}              # add this secret (recommended)
          SIGNING_PASSWORD: ${{ secrets.SECRING_PASSPHRASE }}      # your existing passphrase secret
        run: >
          ./gradlew
          -Psigning.secretKeyRingFile=${{ github.workspace }}/secring.gpg
          -Psigning.keyId=${SIGNING_KEYID}
          -Psigning.password=${SIGNING_PASSWORD}
          publishMavenPublicationToSonatypeRepository
          closeSonatypeStagingRepository
  release:
    name: "Make Release Files Available"
    environment: release
    needs: [ publish ]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: "📝 Establish release version"
        run: echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ env.TAG }}

      - name: "Export .sdkmanrc properties"
        uses: apache/grails-github-actions/export-gradle-properties@asf
        with:
          file: ".sdkmanrc"
          prefix: "SDKMANRC_"

      - name: "Determine Java Version"
        run: echo "SDKMANRC_java=${{ env.SDKMANRC_java }}" | sed 's/-.*//' >> $GITHUB_ENV

      - name: "☕️ Setup JDK"
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.SDKMANRC_java }}

      - name: "🐘 Setup Gradle"
        uses: gradle/actions/setup-gradle@v4

      - name: "📤 Release staging repository"
        env:
          NEXUS_PUBLISH_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          NEXUS_PUBLISH_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          NEXUS_PUBLISH_URL: 'https://ossrh-staging-api.central.sonatype.com/service/local/'
          NEXUS_PUBLISH_DESCRIPTION: '${{ env.REPO_NAME }}:${{ env.VERSION }}'
        run: >
          ./gradlew
          findSonatypeStagingRepository
          releaseSonatypeStagingRepository

  docs:
    environment: docs
    name: "Publish Documentation"
    needs: [ publish, release ]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: "📝 Establish release version"
        run: echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ env.TAG }}

      - name: "Export .sdkmanrc properties"
        uses: apache/grails-github-actions/export-gradle-properties@asf
        with:
          file: ".sdkmanrc"
          prefix: "SDKMANRC_"

      - name: "Determine Java Version"
        run: echo "SDKMANRC_java=${{ env.SDKMANRC_java }}" | sed 's/-.*//' >> $GITHUB_ENV

      - name: "☕️ Setup JDK"
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.SDKMANRC_java }}

      - name: "🐘 Setup Gradle"
        uses: gradle/actions/setup-gradle@v4

      - name: "🔨 Build Documentation"
        run: ./gradlew docs

      - name: "🚀 Publish to Github Pages"
        uses: apache/grails-github-actions/deploy-github-pages@asf
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GRADLE_PUBLISH_RELEASE: 'true'
          SOURCE_FOLDER: build/docs
          VERSION: ${{ env.VERSION }}

  close:
    name: "To Next Version"
    environment: close
    needs: [ publish, docs, release ]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: "📝 Establish release version"
        run: echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ env.TAG }}

      - name: "Export .sdkmanrc properties"
        uses: apache/grails-github-actions/export-gradle-properties@asf
        with:
          file: ".sdkmanrc"
          prefix: "SDKMANRC_"

      - name: "Determine Java Version"
        run: echo "SDKMANRC_java=${{ env.SDKMANRC_java }}" | sed 's/-.*//' >> $GITHUB_ENV

      - name: "☕️ Setup JDK"
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.SDKMANRC_java }}

      - name: "🐘 Setup Gradle"
        uses: gradle/actions/setup-gradle@v4

      - name: "⚙️ Run post-release"
        uses: apache/grails-github-actions/post-release@asf
