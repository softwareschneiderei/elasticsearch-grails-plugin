info:
  app:
    name: '@info.app.name@'
    version: '@info.app.version@'
    grailsVersion: '@info.app.grailsVersion@'
grails:
  codegen:
    defaultPackage: grails.plugins.elasticsearch
  profile: web-plugin
  mime:
    disable:
      accept:
        header:
          userAgents:
          - Gecko
          - WebKit
          - Presto
          - Trident
    types:
      all: '*/*'
      atom: application/atom+xml
      css: text/css
      csv: text/csv
      form: application/x-www-form-urlencoded
      html:
      - text/html
      - application/xhtml+xml
      js: text/javascript
      json:
      - application/json
      - text/json
      multipartForm: multipart/form-data
      pdf: application/pdf
      rss: application/rss+xml
      text: text/plain
      hal:
      - application/hal+json
      - application/hal+xml
      xml:
      - text/xml
      - application/xml
  views:
    gsp:
      encoding: UTF-8
      htmlcodec: xml
      codecs:
        expression: html
        scriptlet: html
        taglib: none
        staticparts: none
    default:
      codec: html
dataSource:
  dbCreate: create-drop
  pooled: true
  jmxExport: true
  driverClassName: org.h2.Driver
  dialect: org.hibernate.dialect.H2Dialect
  username: sa
  password:
  url: jdbc:h2:mem:testDb;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE
---
elasticSearch:
  cluster.name: docker-elasticsearch
  date:
    formats: ["yyyy-MM-dd'T'HH:mm:ss.SSS'Z'"]
  client:
    connectTimeout: 2
    socketTimeout: 30
    hosts:
      - {host: localhost, port: 9200}
  defaultExcludedProperties: ['password']
  disableAutoIndex: false
  index:
    compound_format: true
  unmarshallComponents: true
  searchableProperty:
    name: searchable
  includeTransients: false
---
environments:
  development:
    elasticSearch:
      client:
        mode: local
        transport.sniff: true
      bulkIndexOnStartup: true
      datastoreImpl: hibernateDatastore
  test:
    elasticSearch:
      client:
        mode: local
        hosts:
          - {host: localhost, port: 9200}
        transport.sniff: false
        username:
        password:
      datastoreImpl: hibernateDatastore
      index:
        store.type: simplefs
        settings:
          analysis:
            filter:
              replace_synonyms:
                type: synonym
                synonyms: ['abc => xyz']
            analyzer:
              test_analyzer:
                tokenizer: standard
                filter: ['lowercase']
              repl_analyzer:
                tokenizer: standard
                filter: ['lowercase', 'replace_synonyms']
  production:
    elasticSearch:
      client:
        mode: node
hibernate:
  cache:
    queries: false
    use_second_level_cache: true
    use_query_cache: false
    region.factory_class: org.hibernate.cache.ehcache.SingletonEhCacheRegionFactory
